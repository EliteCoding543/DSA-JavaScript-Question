<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blinkit Clone</title>

    <link rel="stylesheet" href="style.css">
     <link rel="stylesheet" href="Media Query.css">
    <!-- Okra Font -->
    <link rel="stylesheet" href="https://b.zmtcdn.com/data/o2_assets/f0e6-okra-fonts.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>
</head>

<body>

    <header>

        <!-- Logo -->
        <div class="logo">
            <img src="./Assest/SVG/svg-1.svg" alt="Blinkit Logo" class="logo-img">
        </div>

        <!-- Navbar -->
        <nav>

            <!-- Delivery Location -->
            <div class="location">
                <h6>Delivery in 16 minutes</h6>

                <p>
                    Block-D, D90, D Block, Sector 2
                    <i class="fa-solid fa-angle-down"></i>
                </p>
            </div>

            <!-- Search Bar -->
            <div class="search-bar">

                <i class="fa-solid fa-magnifying-glass search-icon"></i>

                <input 
                    type="text"
                    id="input-bar"
                    placeholder='Search "rice"'
                >
            </div>

            <!-- Buttons -->
            <div class="nav-btns">

                <button class="btn-login">
                    Login
                </button>

                <button class="cart">
                    <i class="fa-solid fa-cart-shopping"></i>
                    My Cart
                </button>

            </div>

        </nav>

    </header>

    <!-- ================= HOME BANNER ================= -->

<section class="home-banner">
    <div class="banner-content">
     <img src="Assest/JPG/Frame-1437256605-2-2.jpg" alt="">
    </div>
</section>

 <!-- ================= HOME BANNER2 ================= -->

    </div>

    <div class="banner-2">

</section>
